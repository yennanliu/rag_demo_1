<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Demo - Interactive Knowledge Base</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 RAG Demo</h1>
            <p class="subtitle">Interactive Knowledge Base with AI</p>
        </header>

        <div class="main-grid">
            <!-- Left Side: Chat Interface -->
            <div class="chat-section">
                <div class="card chat-card">
                    <h2><span class="icon">💬</span> Conversation</h2>

                    <div class="conversation-container" id="conversationHistory"></div>

                    <div class="chat-input-area">
                        <textarea id="questionInput" rows="2" placeholder="Ask a question... (Enter to send, Shift+Enter for new line)"></textarea>
                        <div class="chat-actions">
                            <button onclick="app.askQuestion()" class="primary-btn">
                                <span>Send</span>
                                <span class="shortcut">⏎</span>
                            </button>
                            <button onclick="app.loadSavedConversations()" class="secondary">💾 History</button>
                            <button onclick="app.saveConversationToServer()" class="secondary">📥 Save</button>
                            <button onclick="app.clearConversation()" class="secondary">🗑️ Clear</button>
                        </div>
                        <div class="loading" id="queryLoading">Thinking</div>
                        <div class="error" id="queryError"></div>
                    </div>
                </div>
            </div>

            <!-- Right Side: Knowledge Management -->
            <div class="management-section">
                <div class="card">
                    <h2><span class="icon">📝</span> Add Knowledge</h2>
                    <textarea id="documentInput" rows="4" placeholder="Enter information to add to the knowledge base..."></textarea>
                    <div class="button-group">
                        <button onclick="app.addDocument()" class="primary-btn">Add Document</button>
                        <button class="secondary" onclick="app.loadDocuments()">📚 View All</button>
                        <button class="secondary" onclick="app.exportKnowledgeBase()">📥 Export</button>
                        <button class="secondary" onclick="app.importKnowledgeBase()">📤 Import</button>
                    </div>
                    <div class="loading" id="addLoading">Adding</div>
                    <div class="error" id="addError"></div>
                    <div class="success" id="addSuccess"></div>
                </div>

                <div class="card">
                    <h2>
                        <span class="icon">⚙️</span>
                        Sample Documents
                        <span class="badge" id="sampleCount">0</span>
                    </h2>
                    <p class="help-text">
                        Configure default documents that load on startup. Saved to <code>config.json</code>.
                    </p>

                    <div id="sampleDocsList"></div>

                    <div class="button-group" style="margin-top: 20px;">
                        <button onclick="app.addSampleDoc()" class="secondary">+ Add Sample</button>
                        <button onclick="app.saveConfig()" class="primary-btn">💾 Save Config</button>
                        <button onclick="app.reloadSamples()" class="secondary">🔄 Reload</button>
                    </div>

                    <div class="loading" id="configLoading">Processing</div>
                    <div class="error" id="configError"></div>
                    <div class="success" id="configSuccess"></div>
                </div>
            </div>
        </div>

        <div class="status" id="status">
            <span>Ready</span>
            <span class="separator">•</span>
            <span id="docCount">0 documents</span> in knowledge base
        </div>
    </div>

    <!-- Documents Modal -->
    <div id="docsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>📚 Knowledge Base Documents</h2>
                <button class="close-btn" onclick="app.closeModal()">×</button>
            </div>
            <div class="modal-body" id="docsModalList"></div>
            <div class="modal-footer">
                <button class="secondary" onclick="app.closeModal()">Close</button>
                <button class="danger" onclick="app.clearKnowledgeBase()">Clear All Documents</button>
            </div>
        </div>
    </div>

    <!-- Conversations History Modal -->
    <div id="conversationsModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>💬 Saved Conversations</h2>
                <button class="close-btn" onclick="app.closeConversationsModal()">×</button>
            </div>
            <div class="modal-body" id="conversationsModalList"></div>
            <div class="modal-footer">
                <button class="secondary" onclick="app.exportAllConversations()">📥 Export All</button>
                <button class="secondary" onclick="app.importConversations()">📤 Import</button>
                <button class="secondary" onclick="app.closeConversationsModal()">Close</button>
            </div>
        </div>
    </div>

    <script src="{{ url_for('static', filename='app.js') }}"></script>
</body>
</html>
