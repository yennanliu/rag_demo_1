<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG Demo - Interactive Knowledge Base</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
        }

        .subtitle {
            opacity: 0.9;
            font-size: 1.1rem;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 20px;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
        }

        h2 {
            color: #667eea;
            margin-bottom: 20px;
            font-size: 1.5rem;
        }

        textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            resize: vertical;
            transition: border-color 0.3s;
        }

        textarea:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        button:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: #6c757d;
        }

        button.secondary:hover {
            background: #5a6268;
        }

        .answer-box {
            background: #f8f9fa;
            border-left: 4px solid #667eea;
            padding: 20px;
            border-radius: 8px;
            margin-top: 20px;
            display: none;
        }

        .answer-box.show {
            display: block;
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .answer-text {
            color: #333;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .status {
            text-align: center;
            color: #6c757d;
            margin-top: 10px;
            font-size: 0.9rem;
        }

        .documents-list {
            background: #f8f9fa;
            border-radius: 8px;
            padding: 15px;
            margin-top: 15px;
            max-height: 300px;
            overflow-y: auto;
        }

        .document-item {
            background: white;
            padding: 12px;
            margin-bottom: 8px;
            border-radius: 6px;
            border-left: 3px solid #667eea;
            font-size: 0.95rem;
        }

        .loading {
            display: none;
            text-align: center;
            color: #667eea;
            margin: 15px 0;
        }

        .loading.show {
            display: block;
        }

        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 8px;
            margin-top: 15px;
            display: none;
        }

        .error.show {
            display: block;
        }

        .button-group {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🧠 RAG Demo</h1>
            <p class="subtitle">Interactive Knowledge Base with AI</p>
        </header>

        <div class="card">
            <h2>📝 Add Knowledge</h2>
            <textarea id="documentInput" rows="3" placeholder="Enter information to add to the knowledge base..."></textarea>
            <div class="button-group">
                <button onclick="addDocument()">Add Document</button>
                <button class="secondary" onclick="loadDocuments()">View All Documents</button>
                <button class="secondary" onclick="clearKnowledgeBase()">Clear All</button>
            </div>
            <div class="loading" id="addLoading">Adding...</div>
            <div class="error" id="addError"></div>
            <div class="documents-list" id="documentsList" style="display: none;"></div>
        </div>

        <div class="card">
            <h2>💬 Ask Questions</h2>
            <textarea id="questionInput" rows="2" placeholder="Ask a question about the knowledge base..."></textarea>
            <button onclick="askQuestion()">Ask Question</button>
            <div class="loading" id="queryLoading">Thinking...</div>
            <div class="error" id="queryError"></div>
            <div class="answer-box" id="answerBox">
                <strong style="color: #667eea;">Answer:</strong>
                <div class="answer-text" id="answerText"></div>
            </div>
        </div>

        <div class="status" id="status">Ready</div>
    </div>

    <script>
        // Add document to knowledge base
        async function addDocument() {
            const text = document.getElementById('documentInput').value.trim();
            if (!text) {
                showError('addError', 'Please enter some text');
                return;
            }

            showLoading('addLoading', true);
            hideError('addError');

            try {
                const response = await fetch('/api/add', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('documentInput').value = '';
                    updateStatus(`Document added! Total: ${data.total_docs}`);
                } else {
                    showError('addError', data.error);
                }
            } catch (error) {
                showError('addError', 'Failed to add document: ' + error.message);
            } finally {
                showLoading('addLoading', false);
            }
        }

        // Ask question
        async function askQuestion() {
            const question = document.getElementById('questionInput').value.trim();
            if (!question) {
                showError('queryError', 'Please enter a question');
                return;
            }

            showLoading('queryLoading', true);
            hideError('queryError');
            document.getElementById('answerBox').classList.remove('show');

            try {
                const response = await fetch('/api/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });

                const data = await response.json();

                if (data.success) {
                    document.getElementById('answerText').textContent = data.answer;
                    document.getElementById('answerBox').classList.add('show');
                    updateStatus(`Answer generated from ${data.total_docs} documents`);
                } else {
                    showError('queryError', data.error);
                }
            } catch (error) {
                showError('queryError', 'Failed to get answer: ' + error.message);
            } finally {
                showLoading('queryLoading', false);
            }
        }

        // Load and display all documents
        async function loadDocuments() {
            const list = document.getElementById('documentsList');
            list.style.display = 'block';
            list.innerHTML = '<div style="text-align: center;">Loading...</div>';

            try {
                const response = await fetch('/api/documents');
                const data = await response.json();

                if (data.success) {
                    if (data.documents.length === 0) {
                        list.innerHTML = '<div style="text-align: center; color: #6c757d;">No documents yet</div>';
                    } else {
                        list.innerHTML = data.documents.map((doc, i) =>
                            `<div class="document-item">${i + 1}. ${doc}</div>`
                        ).join('');
                    }
                }
            } catch (error) {
                list.innerHTML = '<div style="color: #721c24;">Failed to load documents</div>';
            }
        }

        // Clear knowledge base
        async function clearKnowledgeBase() {
            if (!confirm('Clear all documents from the knowledge base?')) return;

            try {
                const response = await fetch('/api/clear', { method: 'POST' });
                const data = await response.json();

                if (data.success) {
                    updateStatus('Knowledge base cleared');
                    document.getElementById('documentsList').style.display = 'none';
                    document.getElementById('answerBox').classList.remove('show');
                }
            } catch (error) {
                alert('Failed to clear: ' + error.message);
            }
        }

        // Helper functions
        function showLoading(id, show) {
            document.getElementById(id).classList.toggle('show', show);
        }

        function showError(id, message) {
            const el = document.getElementById(id);
            el.textContent = message;
            el.classList.add('show');
        }

        function hideError(id) {
            document.getElementById(id).classList.remove('show');
        }

        function updateStatus(message) {
            document.getElementById('status').textContent = message;
        }

        // Enter key shortcuts
        document.getElementById('documentInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') addDocument();
        });

        document.getElementById('questionInput').addEventListener('keydown', (e) => {
            if (e.ctrlKey && e.key === 'Enter') askQuestion();
        });
    </script>
</body>
</html>
